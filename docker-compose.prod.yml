services:
  app:
    build:
      context: .
      dockerfile: docker/prod/php/Dockerfile
    container_name: api_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - ./:/var/www
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app_net

  nginx:
    image: nginx:1.27-alpine
    container_name: api_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www:ro
      - ./docker/prod/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_net

  queue:
    build:
      context: .
      dockerfile: docker/prod/php/Dockerfile
    container_name: api_queue
    restart: unless-stopped
    env_file:
      - .env
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=120"]
    volumes:
      - ./:/var/www
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app_net

  scheduler:
    build:
      context: .
      dockerfile: docker/prod/php/Dockerfile
    container_name: api_scheduler
    restart: unless-stopped
    env_file:
      - .env
    command: ["/bin/sh", "-c", "while true; do php artisan schedule:run --no-interaction; sleep 60; done"]
    volumes:
      - ./:/var/www
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app_net

  mysql:
    image: mysql:8.0
    container_name: api_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app_net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: api_phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    environment:
      PMA_ARBITRARY: 1
      PMA_HOST: mysql
      PMA_PORT: 3306
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    container_name: api_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_net

volumes:
  mysql_data:
  redis_data:

networks:
  app_net:
    driver: bridge
